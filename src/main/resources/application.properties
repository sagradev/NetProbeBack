# Render injeta $PORT automaticamente; fallback para 8080 em dev
server.port=${PORT:8080}
spring.application.name=netprobe

# Origens permitidas no CORS — sobrescrever com env var CORS_ORIGINS no Render
netprobe.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# Timeout de conexão com o MikroTik (ms)
mikrotik.connection.timeout=5000

# Logging
logging.level.com.netprobe=DEBUG
