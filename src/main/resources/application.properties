server.port=8080
spring.application.name=netprobe

# Origens permitidas no CORS (separadas por vírgula)
netprobe.cors.allowed-origins=http://localhost:4200,https://netprobe.vercel.app

# Timeout de conexão com o MikroTik (ms)
mikrotik.connection.timeout=5000

# Logging
logging.level.com.netprobe=DEBUG
